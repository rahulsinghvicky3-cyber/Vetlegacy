<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetLegacy Notes</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .search-box {
            max-width: 400px;
            margin: 20px auto;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .filter-buttons {
            text-align: center;
            margin-bottom: 20px;
        }

        .filter-buttons button {
            margin: 5px;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #e2e8f0;
        }

        .filter-buttons button.active {
            background: #22c55e;
            color: white;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
        }

        .note-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .note-card h3 {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<header class="navbar">
    <div class="nav-container">
        <h2 class="logo">VetLegacy 🐾</h2>
    </div>
</header>

<section class="hero">
    <h1>VetLegacy Notes</h1>
    <p>Search • Filter • Study Smart</p>
</section>

<!-- 🔍 SEARCH -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search subject...">
</div>

<!-- 🎯 FILTER -->
<div class="filter-buttons">
    <button onclick="filterYear('all')" class="active">All</button>
    <button onclick="filterYear('1st')">1st Year</button>
    <button onclick="filterYear('2nd')">2nd Year</button>
    <button onclick="filterYear('3rd')">3rd Year</button>
    <button onclick="filterYear('4th')">4th Year</button>
    <button onclick="filterYear('5th')">5th Year</button>
</div>

<!-- 📚 NOTES -->
<section class="notes-grid" id="notesContainer">

    <!-- SAMPLE SUBJECT -->
    <div class="note-card" data-year="1st">
        <h3>Anatomy</h3>
        <a href="pdfs/anatomy.pdf" target="_blank" class="btn">View PDF</a>
    </div>

    <div class="note-card" data-year="1st">
        <h3>Physiology</h3>
        <a href="pdfs/physiology.pdf" target="_blank" class="btn">View PDF</a>
    </div>

    <div class="note-card" data-year="2nd">
        <h3>Pathology</h3>
        <a href="pdfs/pathology.pdf" target="_blank" class="btn">View PDF</a>
    </div>

    <div class="note-card" data-year="3rd">
        <h3>Pharmacology</h3>
        <a href="pdfs/pharmacology.pdf" target="_blank" class="btn">View PDF</a>
    </div>

</section>

<!-- SCRIPT -->
<script>
const searchInput = document.getElementById("searchInput");
const notes = document.querySelectorAll(".note-card");

searchInput.addEventListener("keyup", () => {
    const value = searchInput.value.toLowerCase();

    notes.forEach(card => {
        const text = card.innerText.toLowerCase();
        card.style.display = text.includes(value) ? "block" : "none";
    });
});

function filterYear(year) {
    document.querySelectorAll(".filter-buttons button").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");

    notes.forEach(card => {
        if (year === "all" || card.dataset.year === year) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
}
</script>

</body>
</html>
