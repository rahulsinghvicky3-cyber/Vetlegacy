 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetLegacy Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
    <h2>VetLegacy Quiz 🧠</h2>
</header>

<section class="quiz-container">

    <div class="quiz-top">
        <p id="timer">⏱ 15</p>
    </div>

    <h2 id="question">Loading...</h2>

    <div id="options"></div>

    <!-- ✅ Explanation -->
    <p id="explanation" style="margin-top:10px; font-weight:bold;"></p>

    <button id="nextBtn" onclick="nextQuestion()" style="display:none;">
        Next Question
    </button>

    <p id="score"></p>

</section>

<!-- ORDER IMPORTANT -->
<script src="quiz.js"></script>
<script src="script.js"></script>

</body>
</html>
