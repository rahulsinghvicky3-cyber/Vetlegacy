 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetLegacy Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔷 NAVBAR -->
<header class="navbar">
    <h2>VetLegacy Quiz 🧠</h2>
</header>

<!-- 🔷 QUIZ CONTAINER -->
<section class="quiz-container">

    <!-- 🔝 TOP INFO BAR -->
    <div class="quiz-top">
        <p id="timer">⏱ 15</p>
        <p id="progress">Question 1 / 100</p>
    </div>

    <!-- ❓ QUESTION -->
    <h2 id="question">Loading...</h2>

    <!-- 🔘 OPTIONS -->
    <div id="options"></div>

    <!-- 💡 EXPLANATION -->
    <p id="explanation" style="margin-top:10px; font-weight:bold;"></p>

    <!-- ➡️ NEXT BUTTON -->
    <button id="nextBtn" class="btn" onclick="nextQuestion()" style="display:none;">
        Next Question
    </button>

    <!-- 📊 SCORE -->
    <p id="score"></p>

</section>

<!-- ⚙️ SCRIPTS (VERY IMPORTANT ORDER + DEFER) -->
<script src="quiz.js" defer></script>
<script src="script.js" defer></script>

</body>
</html>
