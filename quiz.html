 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetLegacy Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
    <h2>VetLegacy Quiz 🧠</h2>
</header>

<section class="quiz-container">

    <h2 id="question">Question here</h2>

    <div id="options" class="options"></div>

    <button id="nextBtn" class="btn" onclick="nextQuestion()" style="display:none;">
        Next Question
    </button>

    <p id="score"></p>

</section>

<script src="quiz.js"></script>

</body>
</html>
<div class="quiz-top">

    <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
    </select>

    <p id="timer">⏱ 15</p>

</div>
<a href="quiz.html" class="btn">Start Test</a>
test.html → (click Start Test) → quiz.html → loads quiz.js
